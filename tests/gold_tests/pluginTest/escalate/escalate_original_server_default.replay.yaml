meta:
  version: "1.0"

sessions:
- transactions:
  - client-request:
      method: "GET"
      version: "1.1"
      url: /path/get
      headers:
        fields:
        - [ Host, origin.server.com ]
        - [ Content-Length, 0 ]
        - [ X-Request, first ]
        - [ uuid, GET ]

    proxy-request:
      method: "GET"
      headers:
        fields:
        - [ X-Request, { value: first, as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 320000 ]
        - [ X-Response, first ]

  - client-request:
      method: "GET"
      version: "1.1"
      url: /path/get_chunked
      headers:
        fields:
        - [ Host, origin.server.com ]
        - [ Content-Length, 0 ]
        - [ X-Request, second ]
        - [ uuid, GET_chunked ]

    proxy-request:
      method: "GET"
      headers:
        fields:
        - [ X-Request, { value: second, as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Transfer-Encoding, chunked ]
        - [ X-Response, second ]
      content:
        size: 320000

  - client-request:
      method: "GET"
      version: "1.1"
      url: /path/get_failed
      headers:
        fields:
        - [ Host, origin.server.com ]
        - [ Content-Length, 0 ]
        - [ X-Request, third ]
        - [ uuid, GET_failed ]

    proxy-request:
      method: "GET"
      headers:
        fields:
        - [ X-Request, { value: third, as: equal } ]

    server-response:
      status: 502
      reason: Bad Gateway
      headers:
        fields:
        - [ Content-Length, 0 ]

  - client-request:
      method: "HEAD"
      version: "1.1"
      url: /api/head/fail_not_escalated
      headers:
        fields:
        - [ Host, origin.server.com ]
        - [ X-Request, head_fail_not_escalated ]
        - [ uuid, HEAD_fail_not_escalated ]

    proxy-request:
      method: "HEAD"
      headers:
        fields:
        - [ X-Request, { value: head_fail_not_escalated, as: equal } ]

    server-response:
      status: 502
      reason: Bad Gateway
      headers:
        fields:
        - [ Content-Length, 0 ]
        - [ X-Response, head_fail_not_escalated ]

  - client-request:
      method: "POST"
      version: "1.1"
      url: /api/post/fail_not_escalated
      headers:
        fields:
        - [ Host, origin.server.com ]
        - [ Content-Type, "application/json" ]
        - [ Content-Length, 1234 ]
        - [ X-Request, post_fail_not_escalated ]
        - [ uuid, POST_fail_not_escalated ]
      content:
        encoding: plain
        size: 1234

    proxy-request:
      method: "POST"
      headers:
        fields:
        - [ X-Request, { value: post_fail_not_escalated, as: equal } ]

    server-response:
      status: 502
      reason: Bad Gateway
      headers:
        fields:
        - [ Content-Length, 0 ]
        - [ X-Response, post_fail_not_escalated ]
