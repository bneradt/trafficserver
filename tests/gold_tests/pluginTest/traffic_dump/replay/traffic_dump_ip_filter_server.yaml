meta:
  version: "1.0"

sessions:
- transactions:
  - client-request:
      method: GET
      url: /one
      version: 1.1
      headers:
        fields:
        - [ Host, www.notls.com ]
        - [ X-Request-1, ultra_sensitive ]
        - [ Content-Length, 0 ]
        - [ uuid, 1 ]

    proxy-request:
      headers:
        fields:
        - [ X-Request-1, { value: ultra_sensitive, as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 16 ]
        - [ Set-Cookie, classified_not_for_logging ]
