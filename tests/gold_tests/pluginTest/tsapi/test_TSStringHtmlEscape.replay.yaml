meta:
  version: "1.0"

autest:
  description: "Verify the HTML escape and unescape APIs with a response transform"

  server:
    name: "server"

  client:
    name: "client"

  ats:
    name: "ts"
    process_config:
      enable_cache: false

    plugin_config:
      - "test_TSStringHtmlEscape.so"

    remap_config:
      - from: "http://html-escape.test/"
        to: "http://127.0.0.1:{SERVER_HTTP_PORT}/"

sessions:
  - transactions:
      - client-request:
          method: "GET"
          version: "1.1"
          url: "/escape"
          headers:
            fields:
              - [Host, html-escape.test]
              - [uuid, html-escape]

        proxy-request:
          method: "GET"
          url: "/escape"

        server-response:
          status: 200
          reason: "OK"
          headers:
            fields:
              - [Content-Type, "text/plain; charset=utf-8"]
              - [Content-Length, 35]
          content:
            encoding: plain
            data: '<p title="a&b">"fish" & ''chips''</p>'

        proxy-response:
          status: 200
          content:
            encoding: plain
            data: '&lt;p title="a&amp;b"&gt;"fish" &amp; ''chips''&lt;/p&gt;'
            verify:
              as: equal

      - client-request:
          method: "GET"
          version: "1.1"
          url: "/unescape"
          headers:
            fields:
              - [Host, html-escape.test]
              - [uuid, html-unescape]

        proxy-request:
          method: "GET"
          url: "/unescape"

        server-response:
          status: 200
          reason: "OK"
          headers:
            fields:
              - [Content-Type, "text/plain; charset=utf-8"]
              - [Content-Length, 55]
          content:
            encoding: plain
            data: '&lt;p title="a&amp;b"&gt;"fish" &amp; ''chips''&lt;/p&gt;'

        proxy-response:
          status: 200
          content:
            encoding: plain
            data: '<p title="a&b">"fish" & ''chips''</p>'
            verify:
              as: equal
