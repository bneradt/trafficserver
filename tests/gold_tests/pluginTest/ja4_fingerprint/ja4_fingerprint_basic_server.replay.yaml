meta:
  version: "1.0"

sessions:
- protocol:
  - name: http
    version: 1
  - name: tcp
  - name: ip

  transactions:
  - client-request:
      method: "GET"
      version: "1.1"
      url: /resource
      headers:
        fields:
        - [ Connection, keep-alive ]
        - [ Content-Length, 0 ]
        - [ uuid, no-existing-headers ]

    proxy-request:
      headers:
        fields:
        - [ ja4, { as: present } ]
        - [ x-ja4-via, { value: 'test.proxy.com', as: equal } ]

    server-response:
      status: 200
      reason: OK
      content:
        encoding: plain
        data: Yay!
