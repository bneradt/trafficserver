meta:
  version: "1.0"

sessions:
- transactions:
  - client-request:
      method: GET
      url: /app/test
      version: '1.1'
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, 2 ]

    proxy-request:
      headers:
        fields:
        - [ Host, { value: example.com, as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, "0" ]
        - [ Connection, close ]
