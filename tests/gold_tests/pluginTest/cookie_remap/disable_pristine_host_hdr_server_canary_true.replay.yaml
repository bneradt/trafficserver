meta:
  version: "1.0"

sessions:
- transactions:
  - client-request:
      method: GET
      url: /app/test
      version: '1.1'
      headers:
        fields:
        - [ Host, example.com ]
        - [ Cookie, "SessionID=333" ]
        - [ uuid, 1 ]

    proxy-request:
      headers:
        fields:
        - [ Host, { value: "canary.com", as: contains } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, "0" ]
        - [ Connection, close ]
