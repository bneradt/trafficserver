meta:
    version: '1.0'

sessions:

- transactions:

  # First: cache miss.
  - client-request:
      method: GET
      url: /trafficserver/some.css
      version: '1.1'
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ Accept, "*/*" ]
        - [ Accept-Encoding, "deflate, gzip, br" ]
        - [ uuid, first-request ]

    server-response:
        status: 200
        reason: OK
        headers:
          fields:
          - [ Content-Type, text/css ]
          - [ Content-Length, 25030 ]
          - [ X-Response, first-missed ]

    proxy-response:
      status: 200
      headers:
        fields:
        # Note that since it is compressed, the content length will be smaller
        # than the 3432 sent by the origin.
        - [ Content-Length, { as: present } ]

