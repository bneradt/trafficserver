meta:
    version: '1.0'

sessions:

- transactions:

  # First: cache miss.
  - client-request:
      method: GET
      url: /trafficserver/some.css
      version: '1.1'
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ Accept, "*/*" ]
        - [ Accept-Encoding, "deflate, gzip, br" ]
        - [ uuid, first-request ]

    server-response:
        status: 200
        reason: OK
        headers:
          fields:
          - [ Date, "Tue, 03 Oct 2023 21:53:37 GMT" ]
          - [ Last-Modified, "Wed, 05 Jul 2023 04:42:53 GMT" ]
          - [ ETag, "095ce8b369cbc690e6d2faa84cb9fb40" ]
          - [ Cache-Control, "public,max-age=31536000" ]
          - [ Accept-Ranges, bytes ]
          - [ Content-Type, text/css ]
          - [ Server, AmazonS3 ]
          - [ Content-Length, 25030 ]
          - [ X-Response, first-missed ]


    proxy-response:
      status: 200
      headers:
        fields:
        - [ Content-Length, { as: present } ]

