#
# Reply with some chunked responses.
#

meta:
  version: "1.0"

sessions:
- transactions:

  #
  # Now test out caching of a chunked response.
  #
  - client-request:
      method: GET
      url: /some/item.jpeg
      version: '1.1'
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ Content-Length, 0 ]
        - [ uuid, some-item-first ]

    server-response:
        status: 200
        reason: OK
        headers:
          fields:
          - [ Content-Type, image/jpeg ]
          - [ Transfer-Encoding, chunked ]
          - [ Connection, keep-alive ]
          - [ Cache-Control, max-age=300 ]
        content:
          encoding: plain
          data: |-
            thisissomechunkeddatatotestwith

    proxy-response:
        status: 200
        content:
          encoding: plain
          data: |-
            thisissomechunkeddatatotestwith
          verify: { as: contains }

  # Now verify that we reply with that same response from cache.
  - client-request:
      # Allow some time for IO to complete for caching the first response.
      delay: 200ms

      method: GET
      url: /some/item.jpeg
      version: '1.1'
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ Content-Length, 0 ]
        - [ uuid, some-item-second ]

    # The server should not get the request, and thus this response should not
    # be used.
    server-response:
        status: 404
        reason: "Not Found"
        headers:
          fields:
          - [ Content-Length, 0 ]

    # Verify that we got the cached result, not the server's response.
    proxy-response:
        status: 200
        content:
          encoding: plain
          data: |-
            thisissomechunkeddatatotestwith
          verify: { as: contains }

  #
  # Now test out caching of an empty chunked response.
  #
  - client-request:
      method: GET
      url: /empty/item.jpeg
      version: '1.1'
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ Content-Length, 0 ]
        - [ uuid, empty-item-first ]

    server-response:
        status: 200
        reason: OK
        headers:
          fields:
          - [ Content-Type, image/jpeg ]
          - [ Transfer-Encoding, chunked ]
          - [ Connection, keep-alive ]
          - [ Cache-Control, max-age=300 ]
        content:
          size: 0

    proxy-response:
        status: 200
        content:
          size: 0
          verify: { as: equal }

  # Now verify that we reply with that same response from cache.
  - client-request:
      # Allow some time for IO to complete for caching the first response.
      delay: 200ms

      method: GET
      url: /empty/item.jpeg
      version: '1.1'
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ Content-Length, 0 ]
        - [ uuid, empty-item-second ]

    # The server should not get the request, and thus this response should not
    # be used.
    server-response:
        status: 404
        reason: "Not Found"
        headers:
          fields:
          - [ Content-Length, 0 ]

    # Verify that we got the cached result, not the server's response.
    proxy-response:
        status: 200
