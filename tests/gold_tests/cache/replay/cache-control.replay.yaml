#
# This replay file assumes that caching is enabled with default configuration.
#

meta:
  version: "1.0"

  blocks:
  - request_for_path_max_age: &request_for_path_max_age
      client-request:
        method: "GET"
        version: "1.1"
        scheme: "http"
        url: /path/200_max_age
        headers:
          fields:
          - [ Host, example.com ]

  - request_for_path_negative_max_age: &request_for_path_negative_max_age
      client-request:
        method: "GET"
        version: "1.1"
        scheme: "http"
        url: /path/200_negative_max_age
        headers:
          fields:
          - [ Host, example.com ]

sessions:
- transactions:

  #
  # Test 1: Verify that a 200 response with a max-age is cached.
  #
  - all: { headers: { fields: [[ uuid, 1 ]]}}
    <<: *request_for_path_max_age

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 16 ]
        - [ Cache-Control, max-age=300 ]

    proxy-response:
      status: 200

  - all: { headers: { fields: [[ uuid, 2 ]]}}
    <<: *request_for_path_max_age

    # This should not go through to the server. Return a non-200 response to
    # verify it is served from cache.
    server-response:
      status: 400
      reason: "Bad Request"
      headers:
        fields:
        - [ Content-Length, 0 ]

    # Expect the cached 200 response.
    proxy-response:
      status: 200

  #
  # Test 2: Verify that 200 response with a negative max age is not cached.
  #
  - all: { headers: { fields: [[ uuid, 3 ]]}}
    <<: *request_for_path_negative_max_age

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 16 ]
        # Notice the negative max-age
        - [ Cache-Control, max-age=-300 ]

    proxy-response:
      status: 200

  - all: { headers: { fields: [[ uuid, 2 ]]}}
    <<: *request_for_path_negative_max_age

    # This should go through to the server because the above should not be
    # cached.
    server-response:
      status: 400
      reason: "Bad Request"
      headers:
        fields:
        - [ Content-Length, 0 ]

    # Expect the 400 response from the server because the 200 response should
    # not be cached.
    proxy-response:
      status: 400
